name = "shame-api"
main = "src/index.js"
compatibility_date = "2024-12-01"
routes = [{ pattern = "shame.api.skogai.se/*", zone_name = "skogai.se" }]

# Bind your KV namespace here. Create with:
#   wrangler kv namespace create SHAME_KV
# then paste the returned id below.
kv_namespaces = [
  { binding = "SHAME_KV", id = "991b275ce576427795c436d1d5cbc061" }
]

# D1 (SQLite) — stores match HISTORY (one row per match). Squad/disses/shame
# stay in KV; only `match` is backed by D1.
#
# The binding is intentionally COMMENTED OUT until provisioned: a committed
# database_id can't be a real one, and an invalid id makes any build that reads
# this file hard-fail. With the block disabled the worker still deploys and the
# `match` key transparently falls back to KV (see hasD1() in src/index.js).
#
# Enable it with:  ./setup-d1.sh
# That runs `wrangler d1 create shame-db`, uncomments the block below, and fills
# in database_id. Re-runnable.
migrations_dir = "migrations"
[[d1_databases]]
binding = "SHAME_DB"
database_name = "shame-db"
database_id = "1fe2160f-ea0b-4ea0-a48c-32c5a54fcab1"

# ADMIN_PASSWORD is a secret — set with:
#   wrangler secret put ADMIN_PASSWORD
